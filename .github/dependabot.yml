# Dependency updates are PAUSED while Aperant 3.0 is rebuilt in a separate repo.
# open-pull-requests-limit: 0 disables version-update PRs. Restore the limits
# (e.g. 5) to re-enable dependabot once contributions reopen for 3.0.
version: 2
updates:
  # npm dependencies
  - package-ecosystem: npm
    directory: /apps/desktop
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci(deps)"
