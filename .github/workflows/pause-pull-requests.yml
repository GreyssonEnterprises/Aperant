name: Pause Pull Requests

# Temporary: while Aperant 3.0 is being rebuilt from the ground up, code PRs
# against the current codebase can't be merged. This workflow politely declines
# and closes new PRs, pointing contributors to issues / discussions / Discord.
# Remove this workflow once contributions reopen for 3.0.

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  decline:
    runs-on: ubuntu-latest
    # Total freeze: every new PR is declined while 3.0 is rebuilt in a separate
    # repo. To make a one-off exception, temporarily disable or delete this
    # workflow, then merge directly. Remove it entirely when contributions reopen.
    # Safe by design: runs in the base-repo context but never checks out or
    # executes PR code — it only comments and closes.
    steps:
      - name: Comment and close
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "👋 Thanks so much for your interest in contributing to Aperant!",
              "",
              "**Pull requests are currently paused.** We're rebuilding the entire app from the ground up for **Aperant 3.0** (including new cloud features), so changes against the current codebase can't be merged — they'd be overwritten by the rewrite.",
              "",
              "Most of the 3.0 work is happening in a separate development repo right now and will be merged here once it's ready — so although this repo looks quiet, the project is very much alive. 🚀",
              "",
              "We're closing this PR for now, but we'd genuinely love your help shaping 3.0:",
              "",
              "- 🐛 **Report a bug:** https://github.com/AndyMik90/Aperant/issues",
              "- 💡 **Share an idea / feature request:** https://github.com/AndyMik90/Aperant/discussions",
              "- 💬 **Join the Discord:** https://discord.gg/KCXaPBr4Dj",
              "",
              "This is temporary — contributions will reopen once the 3.0 foundation lands. Thank you for understanding! 🙏",
            ].join("\n");
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pull_number,
              body,
            });
            await github.rest.pulls.update({
              owner,
              repo,
              pull_number,
              state: "closed",
            });
